name: "Human Requests Bot"
description: "Create/update GitHub issues from Playwright Python failures"

inputs:
  github_token:
    required: true
  log_path:
    required: true
  screenshot_path:
    required: false
  labels:
    required: false
    default: "bug,playwright"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ github.action_path }}/requirements.txt

    - name: Run bot
      shell: bash
      run: |
        python ${{ github.action_path }}/main.py
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_LOG_PATH: ${{ inputs.log_path }}
        INPUT_SCREENSHOT_PATH: ${{ inputs.screenshot_path }}
        INPUT_LABELS: ${{ inputs.labels }}